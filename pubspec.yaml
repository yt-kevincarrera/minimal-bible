name: minimal_bible
description: "A minimal, beautiful, offline Bible app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^0.4.5+1
  sqlite3: 2.4.6 # debe coincidir con el sqlite3.wasm que descarga el setup
  sqlite3_flutter_libs: ^0.5.24 # SQLite propio con FTS5 (Android no lo trae)
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  flutter_slidable: ^4.0.0
  share_plus: ^10.1.4
  wakelock_plus: ^1.2.8
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  web:
    generate: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#F6F1E7"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/data/rv1960.json
    - assets/data/headings.json
